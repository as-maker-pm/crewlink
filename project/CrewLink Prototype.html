<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CrewLink — Prototype</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --font-primary: 'Montserrat', system-ui, sans-serif;
  --font-secondary: 'Roboto', system-ui, sans-serif;
  --solar-blue: #007bff;
  --carbon-black: #1a1a1a;
  --sun-yellow: #ffc300;
  --slate-gray: #f4f6f8;
  --cool-white: #ffffff;
  --vivid-red: #d93831;
  --border-color: #dde5ef;
  --background: #f4f7fb;
  --foreground: var(--carbon-black);
  --card: var(--cool-white);
  --muted: #eaeef1;
  --muted-foreground: #6b7280;
  --accent: rgba(0,123,255,0.08);
  --accent-strong: rgba(0,123,255,0.20);
  --primary: var(--solar-blue);
  --primary-fg: #fff;
  --success: #10b981;
  --warning: #f59e0b;
  --destructive: #ef4444;
  --border: #e2e8f0;
  --input-bg: #f8fafc;
  --sidebar: #ffffff;
  --sidebar-border: #e5e7eb;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 16px rgba(15,23,42,0.06);
  --radius: 10px;
}
.dark {
  --background: #0a0a0a;
  --foreground: #ffffff;
  --card: #181818;
  --muted: #1f1f1f;
  --muted-foreground: #a1a1aa;
  --accent: rgba(51,156,255,0.12);
  --accent-strong: rgba(51,156,255,0.25);
  --primary: #339cff;
  --border: #27272a;
  --input-bg: #1f1f1f;
  --sidebar: #0f0f0f;
  --sidebar-border: #27272a;
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
}
*,*::before,*::after { box-sizing: border-box; border-color: var(--border); }
html, body { margin:0; padding:0; height:100%; }
body {
  font-family: var(--font-secondary);
  background: var(--background);
  color: var(--foreground);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  transition: background-color .2s ease, color .2s ease;
}
h1,h2,h3,h4,h5 { font-family: var(--font-primary); margin:0; font-weight:700; line-height:1.3; letter-spacing:-0.01em; color: var(--foreground); }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 14px; }
::-webkit-scrollbar { width: 0; height: 0; }
.app { display:grid; grid-template-columns: auto 1fr; min-height:100vh; }

/* Sidebar */
.sb { background: var(--sidebar); border-right: 1px solid var(--sidebar-border); width: 240px; transition: width .2s ease; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
.sb.collapsed { width: 64px; }
.sb-head { height: 74px; display:flex; align-items:center; justify-content:center; border-bottom: 1px solid var(--sidebar-border); padding: 0 16px; }
.brand { display:flex; align-items:center; gap:8px; color: var(--primary); font-family: var(--font-primary); font-weight:700; font-size: 18px; letter-spacing:-0.02em; }
.brand-mark { width:30px; height:30px; border-radius:8px; background: linear-gradient(135deg, var(--primary) 0%, #1e6ed8 100%); display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 12px rgba(0,123,255,0.3); flex-shrink:0; }
.brand-mark svg { width:18px; height:18px; color:#fff; }
.sb-nav { flex:1; padding: 12px 8px; overflow-y:auto; }
.sb-item { display:flex; align-items:center; gap:14px; padding: 11px 14px; border-radius: 10px; color: var(--foreground); cursor:pointer; font-weight:500; font-size: 14px; margin-bottom: 2px; user-select:none; transition: background .12s ease; border-left: 3px solid transparent; }
.sb-item:hover { background: var(--muted); }
.sb-item.active { background: var(--accent); color: var(--primary); font-weight:600; border-left-color: var(--primary); border-radius: 0 10px 10px 0; padding-left: 11px; }
.sb-item svg { width:18px; height:18px; flex-shrink:0; }
.sb-section { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color: var(--muted-foreground); padding: 16px 14px 6px; font-weight:600; }
.sb-foot { border-top: 1px solid var(--sidebar-border); padding: 12px; }

/* Header */
.hd { height: 74px; background: var(--card); border-bottom: 1px solid var(--border); display:flex; align-items:center; padding: 0 24px; gap: 16px; position:sticky; top:0; z-index:30; }
.hd .left { display:flex; align-items:center; gap: 12px; flex:1; }
.search { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; display:flex; align-items:center; gap: 10px; min-width: 320px; }
.search input { background: transparent; border: 0; outline:none; flex:1; color: var(--foreground); }
.search input::placeholder { color: var(--muted-foreground); }
.icon-btn { width:38px; height:38px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); display:flex; align-items:center; justify-content:center; color: var(--foreground); position:relative; }
.icon-btn:hover { background: var(--muted); }
.icon-btn svg { width:18px; height:18px; }
.hd-dot { position:absolute; top:8px; right:9px; width:8px; height:8px; border-radius:50%; background: var(--destructive); border: 2px solid var(--card); }
.avatar { width:38px; height:38px; border-radius: 50%; background: linear-gradient(135deg, #007bff, #1e6ed8); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; cursor:pointer; }
.role-pill { display:flex; align-items:center; gap:8px; padding: 8px 12px; background: var(--muted); border:1px solid var(--border); border-radius: 999px; font-size:12px; font-weight:600; cursor:pointer; color: var(--foreground); }
.role-dot { width:8px; height:8px; border-radius:50%; background: var(--success); }

/* Layout */
.main { padding: 24px; max-width: 100%; min-width: 0; }
.page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom: 20px; flex-wrap:wrap; }
.page-head h1 { font-size: 22px; }
.page-head .sub { color: var(--muted-foreground); font-size: 13px; margin-top: 4px; }

/* Cards */
.card { background: var(--card); border:1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); }
.card.flat { box-shadow:none; }
.card-h { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
.card-h h3 { font-size:15px; font-weight:600; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:8px; padding: 9px 14px; border-radius: 10px; border: 1px solid transparent; font-weight:600; font-size:13px; transition: all .12s; }
.btn svg { width:16px; height:16px; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { filter: brightness(0.95); }
.btn-ghost { background: transparent; color: var(--foreground); }
.btn-ghost:hover { background: var(--muted); }
.btn-outline { background: var(--card); border-color: var(--border); color: var(--foreground); }
.btn-outline:hover { background: var(--muted); }
.btn-danger { background: var(--destructive); color: #fff; }
.btn-sm { padding: 6px 10px; font-size:12px; }
.btn-icon { padding: 8px; }

/* Tabs (segmented) */
.seg { display:inline-flex; border:1px solid var(--border); border-radius: 10px; overflow:hidden; background: var(--card); }
.seg button { padding: 8px 16px; font-size:13px; border:0; background:transparent; color:var(--muted-foreground); font-weight:500; }
.seg button.active { background: var(--primary); color:#fff; }

/* Badge */
.badge { display:inline-flex; align-items:center; gap:6px; padding: 3px 9px; border-radius: 999px; font-size:11px; font-weight:600; line-height:1.4; }
.badge-pri { background: var(--accent); color: var(--primary); }
.badge-success { background: rgba(16,185,129,.12); color: var(--success); }
.badge-warn { background: rgba(245,158,11,.14); color: var(--warning); }
.badge-danger { background: rgba(239,68,68,.12); color: var(--destructive); }
.badge-muted { background: var(--muted); color: var(--muted-foreground); }
.dot { width:6px; height:6px; border-radius:50%; }

/* Table */
.tbl { width:100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th { text-align:left; font-size:11px; font-weight:600; color: var(--muted-foreground); text-transform:uppercase; letter-spacing:.06em; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--muted); }
.tbl tbody td { padding: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.tbl tbody tr:hover { background: var(--muted); cursor:pointer; }
.tbl tbody tr:last-child td { border-bottom: 0; }

/* Stats */
.stats { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; margin-bottom: 18px; }
.stat { background: var(--card); border:1px solid var(--border); border-radius: var(--radius); padding:18px; }
.stat .lbl { font-size: 12px; color: var(--muted-foreground); font-weight:500; text-transform:uppercase; letter-spacing:.06em; }
.stat .val { font-size: 28px; font-weight:700; font-family: var(--font-primary); margin-top: 6px; line-height:1; letter-spacing:-0.02em; }
.stat .delta { font-size: 12px; margin-top: 8px; display:flex; align-items:center; gap:5px; color: var(--success); font-weight:500; }
.stat .delta.down { color: var(--destructive); }
.stat-icon { width:40px; height:40px; border-radius: 10px; background: var(--accent); color: var(--primary); display:flex; align-items:center; justify-content:center; float:right; margin-top:-4px; }
.stat-icon.gold { background: rgba(255,195,0,0.15); color: #d99a00; }
.stat-icon.green { background: rgba(16,185,129,0.12); color: var(--success); }
.stat-icon.red { background: rgba(239,68,68,0.12); color: var(--destructive); }

/* Modal */
.modal-bg { position:fixed; inset:0; background: rgba(15,23,42,0.55); display:flex; align-items:center; justify-content:center; z-index: 100; padding: 24px; backdrop-filter: blur(4px); }
.modal { background: var(--card); border-radius: 14px; width: 100%; max-width: 720px; max-height: 90vh; overflow:auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.modal-h { padding: 22px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-b { padding: 22px 24px; }
.modal-f { padding: 16px 24px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:flex-end; gap:10px; }

/* Forms */
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size: 12px; font-weight:600; color: var(--foreground); }
.field .req { color: var(--destructive); }
.input { background: var(--input-bg); border:1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--foreground); width:100%; outline:none; transition: border .12s; }
.input:focus { border-color: var(--primary); }
.grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* Avatar list */
.avatar-sm { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #007bff, #1e6ed8); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:600; font-size:11px; flex-shrink:0; }
.avatar-md { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #007bff, #1e6ed8); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; flex-shrink:0; }

/* Calendar */
.cal-toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 16px; flex-wrap:wrap; }
.cal-month-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { padding: 8px 0; text-align:center; font-size: 11px; color: var(--muted-foreground); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
.cal-day { background: var(--card); border:1px solid var(--border); border-radius: 8px; padding: 8px; min-height: 110px; cursor:pointer; transition: border .1s; display:flex; flex-direction:column; gap:4px; }
.cal-day:hover { border-color: var(--primary); }
.cal-day.muted { opacity: 0.4; }
.cal-day.today { border-color: var(--primary); background: var(--accent); }
.cal-day-num { font-size: 13px; font-weight:600; }
.cal-day.today .cal-day-num { color: var(--primary); }
.cal-event { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight:600; line-height: 1.3; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cal-event.active { background: rgba(0,123,255,0.15); color: var(--primary); border-left: 2px solid var(--primary); }
.cal-event.completed { background: rgba(16,185,129,0.12); color: var(--success); border-left: 2px solid var(--success); }
.cal-event.cancelled { background: rgba(239,68,68,0.12); color: var(--destructive); border-left: 2px solid var(--destructive); text-decoration: line-through; }
.cal-event.conflict { background: rgba(245,158,11,0.18); color: #b45309; border-left: 2px solid var(--warning); }
.cal-more { font-size: 10px; color: var(--muted-foreground); padding: 2px 6px; }

/* Week view */
.week-grid { display:grid; grid-template-columns: 80px repeat(7, 1fr); border:1px solid var(--border); border-radius: 8px; overflow:hidden; }
.week-head { background: var(--muted); padding: 10px 8px; text-align:center; font-size:12px; font-weight:600; border-right: 1px solid var(--border); border-bottom:1px solid var(--border); }
.week-head.today { background: var(--accent); color: var(--primary); }
.week-time { background: var(--muted); padding: 8px; text-align:right; font-size:11px; font-weight:500; color: var(--muted-foreground); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.week-cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding: 4px; min-height: 70px; display:flex; flex-direction: column; gap: 3px; cursor:pointer; }
.week-cell:hover { background: var(--accent); }

/* Day view */
.day-grid { display:grid; grid-template-columns: 80px 1fr; border:1px solid var(--border); border-radius: 8px; overflow:hidden; }
.day-cell { padding: 8px 12px; border-bottom: 1px solid var(--border); min-height: 64px; }
.day-event { background: var(--accent); border-left: 3px solid var(--primary); padding: 8px 10px; border-radius: 6px; margin: 4px 0; cursor:pointer; }
.day-event h4 { font-size: 13px; font-weight:600; margin-bottom: 2px; }
.day-event p { font-size: 12px; color: var(--muted-foreground); margin: 0; }
.day-event.conflict { background: rgba(245,158,11,0.18); border-left-color: var(--warning); }

/* Empty/utility */
.flex { display:flex; }
.row { display:flex; align-items:center; gap: 10px; }
.col { display:flex; flex-direction:column; gap: 4px; }
.muted { color: var(--muted-foreground); }
.spacer { flex: 1; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* Detail layout */
.detail-grid { display:grid; grid-template-columns: 1.6fr 1fr; gap: 18px; }
.kv { display:flex; flex-direction:column; gap:4px; padding: 12px 0; border-bottom: 1px dashed var(--border); }
.kv:last-child { border-bottom: 0; }
.kv .k { font-size: 11px; text-transform:uppercase; letter-spacing:.06em; color: var(--muted-foreground); font-weight:600; }
.kv .v { font-size: 14px; font-weight:500; }

/* Pricing */
.plan-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 24px; position: relative; transition: border .2s; }
.plan-card.featured { border-color: var(--primary); box-shadow: 0 8px 30px rgba(0,123,255,0.15); }
.plan-card .badge-feat { position:absolute; top:-12px; left: 50%; transform: translateX(-50%); background: var(--sun-yellow); color: var(--carbon-black); padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight:700; }

/* Progress */
.bar { width:100%; height:8px; background: var(--muted); border-radius: 999px; overflow:hidden; }
.bar-fill { height:100%; background: var(--primary); border-radius: 999px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--carbon-black); color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 200; box-shadow: 0 8px 30px rgba(0,0,0,0.3); display:flex; align-items:center; gap:10px; animation: slidein .25s ease; }
@keyframes slidein { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

/* Conflict banner */
.banner { padding: 14px 18px; border-radius: 10px; display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; font-size: 13px; }
.banner.warn { background: rgba(245,158,11,0.10); border:1px solid rgba(245,158,11,0.3); color: #b45309; }
.banner.info { background: var(--accent); border: 1px solid rgba(0,123,255,0.25); color: var(--primary); }

/* utility */
.scroll-y { overflow-y: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
